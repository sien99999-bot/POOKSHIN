<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=430, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#F8F4EC" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="POOKSHIN" />
  <title>POOKSHIN - 갓 나온 빵 알림</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="home.css" />
  <link rel="stylesheet" href="minIcon-round.css" />
  <style>
    body {
      margin: 0;
      background-color: #efefef;
      font-family: 'Interop', 'Pretendard Variable', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #app {
      width: 430px;
      height: 932px;
      position: relative;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.4); /* 딤 오버레이 */
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }
    
    @media (max-width: 480px) {
      body {
        align-items: flex-start !important;
        background-color: #000000 !important;
      }
      #app {
        width: 100% !important;
        max-width: 430px !important;
        height: 100dvh !important;
        box-shadow: none !important;
      }
    }

    /* 팝업 카드 (#F8F4EC, rounded 20px) */
    .popup-card {
      width: 398px;
      background: #F8F4EC;
      border-radius: 20px;
      padding: 55px 22px 30px; /* 아이콘/타이틀/버튼 간격 조절 */
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* 상단 알람 아이콘 */
    .alarm-icon {
      font-family: 'Min Icon VF', sans-serif;
      font-size: 31.2px;
      color: #FF9F46;
      font-feature-settings: 'ss09' 1;
      font-variation-settings: 'rond' 3, 'edpt' 1;
      margin-bottom: 24px;
      line-height: 1;
    }

    /* 타이틀 */
    .popup-title {
      font-family: 'Interop', 'Pretendard Variable', sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: #000000;
      text-align: center;
      letter-spacing: -0.48px;
      line-height: 1.5;
      margin: 0 0 32px;
    }

    /* 확인 버튼 */
    .btn-confirm {
      width: 354px;
      height: 54px;
      background: #FF9F46;
      border-radius: 10px;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      
      font-family: 'Interop', 'Pretendard Variable', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #FFFFFF;
      letter-spacing: -0.36px;
      cursor: pointer;
    }

  </style>
</head>
<body>
  <div id="app">
    <!-- 갓 나온 빵 알림 팝업 -->
    <div class="popup-card">
      <div class="alarm-icon">&#xEF60;</div>
      <h2 class="popup-title">
        갓 나온지 30분 된 빵이에요!<br>
        달려가서 '포키' 하세요!
      </h2>
      <a href="home.html" class="btn-confirm">확인</a>
    </div>
  </div>
</body>
</html>
