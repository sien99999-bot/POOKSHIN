﻿<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#F8F4EC" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="POOKSHIN" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.webmanifest" /><title>POOKSHIN - Time Poki</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="home.css" />
  <style>
    body {
      background: #EFEFEF;
    }

    #app {
      background: rgba(0, 0, 0, 0.28);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .time-poki-sheet {
      width: 100%;
      min-height: 430px;
      background: #FFF7DF;
      border-radius: 28px 28px 0 0;
      padding: 18px 24px 34px;
      box-sizing: border-box;
      box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.12);
    }

    .sheet-handle {
      width: 42px;
      height: 5px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.12);
      margin: 0 auto 26px;
    }

    .time-poki-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .time-poki-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.44px;
      color: #000;
    }

    .close-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #FFFFFF;
      color: #3A3A3A;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
    }

    .fresh-time-card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      margin-bottom: 16px;
    }

    .fresh-label {
      margin: 0 0 8px;
      color: #9B9B9B;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .fresh-time {
      margin: 0;
      color: #FB7459;
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -0.88px;
      line-height: 1.2;
    }

    .fresh-desc {
      margin: 12px 0 0;
      color: #000;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.5;
      letter-spacing: -0.34px;
    }

    .fresh-detail-list {
      display: grid;
      gap: 10px;
      margin-bottom: 24px;
    }

    .fresh-detail-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.72);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      color: #3A3A3A;
    }

    .fresh-detail-value {
      color: #FF9F46;
      font-weight: 800;
    }

    .time-poki-actions {
      display: flex;
      gap: 12px;
    }

    .time-poki-btn {
      flex: 1;
      height: 54px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.34px;
    }

    .time-poki-btn.secondary {
      background: #FFFFFF;
      color: #9B9B9B;
    }

    .time-poki-btn.primary {
      background: #FF9F46;
      color: #FFFFFF;
    }
  </style>
</head>
<body>
  <div id="app">
    <section class="time-poki-sheet" role="dialog" aria-modal="true" aria-labelledby="time-poki-title">
      <div class="sheet-handle"></div>

      <div class="time-poki-header">
        <h1 class="time-poki-title" id="time-poki-title">
          <span class="min-icon" style="font-size: 28px;">&#xEF60;</span>
          갓 구운 시간
        </h1>
        <a href="home.html" class="close-btn" aria-label="Close">×</a>
      </div>

      <div class="fresh-time-card">
        <p class="fresh-label">성수동 베이커리의 크루아상</p>
        <p class="fresh-time">30분 전</p>
        <p class="fresh-desc">아직 따뜻함이 남아있어요.<br>지금 포키하면 가장 맛있게 만날 수 있어요.</p>
      </div>

      <div class="fresh-detail-list">
        <div class="fresh-detail-item">
          <span>오늘 나온 시간</span>
          <span class="fresh-detail-value">오전 10:30</span>
        </div>
        <div class="fresh-detail-item">
          <span>추천 픽업 시간</span>
          <span class="fresh-detail-value">지금부터 20분</span>
        </div>
      </div>

      <div class="time-poki-actions">
        <a href="home.html" class="time-poki-btn secondary">닫기</a>
        <a href="poki-success.html" class="time-poki-btn primary">POKI</a>
      </div>
    </section>
  </div>
</body>
</html>
