  <link rel="stylesheet" href="navbar.css" />
  <style>
    #app { background-color: #F8F4EC; }
    
    .setting-header {
      padding: 70px 24px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .setting-header .title { font-size: 28px; font-weight: 800; color: #333; }
    
    .user-summary-card {
      margin: 0 16px;
      background: white;
      border-radius: 24px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    .user-thumb { width: 60px; height: 60px; border-radius: 50%; background: #F2F2F2; overflow: hidden; }
    .user-thumb img { width: 100%; height: 100%; object-fit: cover; }
    
    .user-text h3 { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
    .user-text p { font-size: 13px; color: #9B9B9B; }
    
    .setting-group {
      margin: 30px 16px;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid #F8F8F8;
      text-decoration: none;
      color: #333;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-row .label { font-size: 16px; font-weight: 700; }
    
    .toggle-switch {
      width: 44px;
      height: 24px;
      background: #EFEFEF;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle-switch.active { background: #FF9F46; }
    .toggle-switch.active::after { transform: translateX(20px); }
    
    .footer-actions {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
    }
    .footer-actions a { color: #9B9B9B; font-size: 14px; font-weight: 600; text-decoration: none; }
  </style>
</head>
