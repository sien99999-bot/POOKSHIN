<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#F8F4EC" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="POOKSHIN" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>POOKSHIN - 서비스 이용약관</title>
  <style>
    .page { min-height: 100vh; background: #F8F4EC; padding-top: max(72px, env(safe-area-inset-top)); padding-bottom: 120px; padding-left: 24px; padding-right: 24px; box-sizing: border-box; }
    h1 { font-size: clamp(calc(26px * 0.8), calc(26 * 100vw / 430), 26px); font-weight: 800; margin: 0; }
    .card { background: #fff; border-radius: 24px; padding: 24px; line-height: 1.7; color: #555; }
    .btn { margin-top: max(24px, env(safe-area-inset-top)); height: 54px; border-radius: 12px; background: #FF9F46; color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 800; }
  </style>
  <link rel="stylesheet" crossorigin href="home.css">
</head>
<body>
  <div id="app">
    <main class="page">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h1>서비스 이용약관</h1>
        <a href="setting.html" style="text-decoration:none; color:#000;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </a>
      </div>
      <section class="card" style="font-size: 14px; line-height: 1.8;">
        <strong>제 1조 (목적)</strong><br>
        본 약관은 POOKSHIN(이하 '회사')이 제공하는 위치 기반 베이커리 추천 서비스의 이용과 관련하여 회사와 회원의 권리, 의무 및 책임사항을 규정함을 목적으로 합니다.<br><br>
        <strong>제 2조 (서비스의 제공)</strong><br>
        회사는 사용자(와앙이)의 식감 취향 데이터를 바탕으로 맞춤형 빵과 주변 베이커리를 추천합니다.<br><br>
        <strong>제 3조 (데이터의 수집 및 활용)</strong><br>
        사용자가 '포키'하거나 리뷰를 작성한 데이터는 취향 분석을 위해 저장되며, '내 취향 데이터' 페이지에서 시각화되어 제공됩니다.
      </section>
    </main>
  </div>
</body>
</html>
