﻿<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#F8F4EC" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="POOKSHIN" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.webmanifest" /><title>POOKSHIN - Location Setting</title>
  <link rel="stylesheet" href="home.css" />
  <style>
    .page { min-height: 100vh; background: #F8F4EC; padding-top: max(72px, env(safe-area-inset-top)); padding-bottom: 120px; padding-left: 24px; padding-right: 24px; box-sizing: border-box; }
    h1 { font-size: clamp(calc(28px * 0.8), calc(28 * 100vw / 430), 28px); font-weight: 800; margin: 0 0 24px; }
    .card { background: #fff; border-radius: 24px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,.06); }
    .row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #f3f3f3; font-weight: 700; }
    .row:last-child { border-bottom: 0; }
    .btn { margin-top: max(24px, env(safe-area-inset-top)); height: 54px; border-radius: 12px; background: #FF9F46; color: white; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 800; }
  </style>
</head>
<body>
  <div id="app">
    <main class="page">
     <h1>위치 설정</h1>
      <section class="card">
       <div class="row"><span>현재 위치</span><span>성수동 2가</span></div>
       <div class="row"><span>검색 반경</span><span>300m</span></div>
       <a href="setting.html" class="btn">저장</a>
      </section>
    </main>
  </div>
</body>
</html>
