<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#F8F4EC" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="POOKSHIN" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>POOKSHIN - 위치 설정</title>
  <style>
    .page { min-height: 100vh; background: #F8F4EC; padding-top: max(72px, env(safe-area-inset-top)); padding-bottom: 120px; padding-left: 24px; padding-right: 24px; box-sizing: border-box; }
    h1 { font-size: clamp(calc(26px * 0.8), calc(26 * 100vw / 430), 26px); font-weight: 800; margin: 0; }
    .card { background: #fff; border-radius: 24px; padding: 24px; line-height: 1.7; color: #555; }
    .btn { margin-top: max(24px, env(safe-area-inset-top)); height: 54px; border-radius: 12px; background: #FF9F46; color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 800; }
  </style>
  <link rel="stylesheet" crossorigin href="home.css">
</head>
<body>
  <div id="app">
    <main class="page">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h1>위치 설정</h1>
        <a href="setting.html" style="text-decoration:none; color:#000;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </a>
      </div>
      <section class="card" style="padding: 20px; text-align: center;">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="#FFA74A" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 16px;">
          <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z"/>
        </svg>
        <h3 style="margin-top: 0; color: #000;">현재 설정된 위치</h3>
        <div style="font-size: 20px; font-weight: bold; color: #FB7459; padding: 16px; background: #F8F4EC; border-radius: 12px; margin-bottom: 24px;">성수동 2가</div>
        <p style="font-size: 14px; color: #666; margin-bottom: 24px;">위치 기반으로 갓 구운 빵과 추천 베이커리를 알려드려요.</p>
        <a href="setting.html" class="btn" style="margin-top: 0;">현재 위치로 다시 찾기</a>
      </section>
    </main>
  </div>
</body>
</html>
