﻿<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#F8F4EC" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="POOKSHIN" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.webmanifest" /><title>POOKSHIN - Profile Edit</title>
  <link rel="stylesheet" href="home.css" />
  <style>
    .modal-page { min-height: 100vh; background: rgba(0,0,0,.18); display: flex; align-items: flex-end; }
    .sheet { width: 100%; background: #fff; border-radius: 28px 28px 0 0; padding: 28px 24px 36px; box-sizing: border-box; }
    h1 { margin: 0 0 20px; font-size: clamp(calc(26px * 0.8), calc(26 * 100vw / 430), 26px); font-weight: 800; }
    label { display: block; margin: 16px 0 8px; font-size: clamp(calc(14px * 0.8), calc(14 * 100vw / 430), 14px); font-weight: 800; color: #9B9B9B; }
    input { width: 100%; height: 52px; border: 1px solid #eee; border-radius: 12px; padding: 0 14px; box-sizing: border-box; font: inherit; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: max(24px, env(safe-area-inset-top)); }
    .btn { height: 54px; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 800; }
    .cancel { background: #F2F2F2; color: #9B9B9B; }
    .save { background: #FF9F46; color: #fff; }
  </style>
</head>
<body>
  <div id="app">
    <main class="modal-page">
      <section class="sheet">
       <h1>프로필 수정</h1>
       <label>닉네임</label>
       <input value="와앙이1234" />
       <label>이메일</label>
        <input value="sien99999@gmail.com" />
        <div class="actions">
       <a href="my.html" class="btn cancel">취소</a>
       <a href="my.html" class="btn save">저장</a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
