<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=430, user-scalable=no" />
    <meta name="theme-color" content="#F8F4EC" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="POOKSHIN" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>POOKSHIN - 마이페이지</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="home.css" />
  <link rel="stylesheet" href="navbar.css" />
  <style>
    #app { background-color: #F8F4EC; }
    
    .my-header {
      padding: 70px 24px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .my-title { font-size: 32px; font-weight: 900; color: #333; }
    
    .profile-card {
      margin: 0 16px;
      background: white;
      border-radius: 24px;
      padding: 30px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      position: relative;
    }
    
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #F2F2F2;
      overflow: hidden;
      border: 4px solid #FF9F46;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .profile-info h2 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .profile-info p { font-size: 14px; color: #9B9B9B; }
    
    .profile-edit-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #F2F2F2;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #9B9B9B;
      text-decoration: none;
    }
    
    .taste-summary-banner {
      margin: 20px 16px;
      background: #FFF;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    
    .taste-text { font-size: 16px; font-weight: 700; color: #333; }
    .taste-text .highlight { color: #FF9F46; }
    
    .quick-stats {
      display: flex;
      margin: 20px 16px;
      background: white;
      border-radius: 24px;
      padding: 24px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    
    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      border-right: 1px solid #F2F2F2;
    }
    .stat-item:last-child { border-right: none; }
    .stat-item .count { font-size: 20px; font-weight: 800; }
    .stat-item .label { font-size: 13px; color: #9B9B9B; font-weight: 600; }
    
    .info-list {
      margin: 20px 16px;
      background: white;
      border-radius: 24px;
      padding: 10px 24px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 18px 0;
      border-bottom: 1px solid #F8F8F8;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { font-weight: 700; color: #333; }
    .info-row .value { color: #9B9B9B; font-weight: 600; }
  </style>
</head>
<body>
  <div id="app">

    <div class="my-header">
       <span class="my-title">MY WA-ANG</span>
       <span class="min-icon" style="font-size:24px; color:#333;">&#xEF40;</span>
    </div>

    <!-- Profile Section (1016:1661) -->
    <div class="profile-card">
       <div class="profile-avatar">
          <img src="images/decoration-1.svg" alt="" />
       </div>
       <div class="profile-info">
       <h2>와앙이1234</h2>
          <p>sien99999@gmail.com</p>
       </div>
       <a href="profile-edit.html" class="profile-edit-btn">프로필 수정</a>
    </div>

    <!-- Taste Summary (1016:1664) -->
    <div class="taste-summary-banner">
       <div class="taste-text">
       디저트는 <span class="highlight">바삭하게</span> 좋아 -!
       </div>
       <a href="taste-data.html" style="text-decoration:none;">
          <span class="min-icon" style="font-size:20px; color:#C3C3C3;">&#xE150;</span>
       </a>
    </div>

    <!-- Stats Section (1016:1685) -->
    <div class="quick-stats">
       <a href="bookmark-bread.html" class="stat-item" style="text-decoration:none; color:inherit;">
          <span class="min-icon" style="color:#FB7459; font-size:24px;">&#xEF20;</span>
          <span class="count">12</span>
          <span class="label">찜한 빵</span>
       </a>
       <a href="bookmark-shop.html" class="stat-item" style="text-decoration:none; color:inherit;">
          <span class="min-icon" style="color:#FF9F46; font-size:24px;">&#xEFA0;</span>
          <span class="count">5</span>
          <span class="label">찜한 가게</span>
       </a>
       <a href="my-reviews.html" class="stat-item" style="text-decoration:none; color:inherit;">
          <span class="min-icon" style="color:#BBD884; font-size:24px;">&#xE110;</span>
          <span class="count">8</span>
          <span class="label">내 리뷰</span>
       </a>
    </div>

    <!-- User Info (1016:1666) -->
    <div class="info-list">
       <div class="info-row">
          <span class="label">닉네임</span>
          <span class="value">와앙이1234</span>
       </div>
       <div class="info-row">
          <span class="label">생년월일</span>
          <span class="value">1999. 05. 13</span>
       </div>
       <div class="info-row">
          <span class="label">이메일주소</span>
          <span class="value">sien99999@gmail.com</span>
       </div>
       <div class="info-row">
          <span class="label">위치설정</span>
          <span class="value">성수동 2가</span>
       </div>
    </div>

    <!-- Tab Bar (Bottom Navigation) -->
    <nav class="menu-bar">
      <a href="home.html" class="menu-item">
        <span class="min-icon">&#xE110;</span>
        <span>HOME</span>
      </a>
      <a href="map.html" class="menu-item">
        <span class="min-icon">&#xEFA0;</span>
        <span>MAP</span>
      </a>
      <a href="my.html" class="menu-item active">
        <span class="min-icon">&#xEF20;</span>
        <span>MY PAGE</span>
      </a>
      <a href="setting.html" class="menu-item">
        <span class="min-icon">&#xE0B0;</span>
        <span>SETTING</span>
      </a>
    </nav>

  </div>
</body>
</html>
