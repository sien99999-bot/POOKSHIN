<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=430, user-scalable=no" />
    <meta name="theme-color" content="#F8F4EC" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="POOKSHIN" />
  <link rel="apple-touch-icon" href="/assets/icon-hWEU-vOK.png" />
  <link rel="manifest" href="manifest.webmanifest" /><title>POOKSHIN - Splash</title>
  <style>
    body {
      margin: 0;
      background-color: #EFEFEF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }
    #app {
      width: 430px;
      height: 932px;
      background-color: #F8F4EC;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    @media (max-width: 480px) {
      body {
        align-items: center !important;
        background-color: #EFEFEF !important;
      }
      #app {
        width: 100% !important;
        max-width: 430px !important;
        max-height: 100dvh !important;
        aspect-ratio: 430 / 932 !important;
        box-shadow: none !important;
      }
    }
    .splash-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .logo-img {
      width: 342px;
      height: auto;
    }
  </style>
  <link rel="stylesheet" crossorigin href="/assets/home-DsQNiKwc.css">
</head>
<body>
  <div id="app">
    <div class="splash-container">
      <img src="/assets/logo-CKanDHkn.svg" class="logo-img" alt="POOKSHIN" />
    </div>
  </div>
  <script>
    setTimeout(() => {
      window.location.href = 'onboarding.html';
    }, 2000);
  </script>
</body>
</html>
