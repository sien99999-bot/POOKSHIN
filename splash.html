<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#FF9F46" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="POOKSHIN" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>POOKSHIN - Splash</title>
  <link rel="stylesheet" href="home.css" />
  
  <style>
    /* 브라우저 기본 여백 리셋 및 스크롤 잠금 */
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      background-color: #FF9F46;
      overflow: hidden !important; /* 바디 스크롤 절대 방지 */
      height: 100dvh !important;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* home.css의 #app 스타일을 스플래시 화면에 맞게 덮어쓰기 */
    #app {
      width: 100% !important;
      max-width: 430px !important;
      height: 100dvh !important;
      min-height: 100dvh !important;
      padding-top: 0 !important; /* 상단 안전영역 패딩 방지 */
      box-shadow: none !important;
      overflow: hidden !important;
    }

    /* vh 대신 dvh를 사용하여 정확한 화면 높이 고정 */
    .splash-container {
      width: 100%; 
      height: 100dvh; /* 100% 화면 꽉 채우기 */
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* 로고 크기 제한 */
    .logo-img {
      width: 80%;
      max-width: 342px;
      height: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="splash-container">
      <img src="images/logo.svg" class="logo-img" alt="POOKSHIN" />
    </div>
  </div>
  <script>
    setTimeout(() => {
      window.location.href = 'onboarding.html';
    }, 2000);
  </script>
</body>
</html>
