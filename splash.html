<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#FF9F46" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="POOKSHIN" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>POOKSHIN - Splash</title>

  <style>
    /* 모든 여백 초기화 */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* html 전체를 주황색으로 — 홈 인디케이터 아래 빈 공간까지 커버 */
    html {
      background-color: #FF9F46;
      height: 100%;
      width: 100%;
    }

    body {
      background-color: #FF9F46;
      width: 100%;
      height: 100dvh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-text-size-adjust: none;
    }

    #app {
      width: 100%;
      height: 100%;
      background: #FF9F46;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-img {
      width: 80%;
      max-width: 342px;
      height: auto;
      filter: brightness(0) invert(1);
    }
  </style>
</head>
<body>
  <div id="app">
    <img src="/assets/logo-CKanDHkn.svg" class="logo-img" alt="POOKSHIN" />
  </div>
  <script>
    setTimeout(() => {
      window.location.href = 'onboarding.html';
    }, 2000);
  </script>
</body>
</html>
