<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#F8F4EC" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="POOKSHIN" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>POOKSHIN - 문의하기</title>
  <style>
    .page { min-height: 100vh; background: #F8F4EC; padding-top: max(72px, env(safe-area-inset-top)); padding-bottom: 120px; padding-left: 24px; padding-right: 24px; box-sizing: border-box; }
    h1 { font-size: clamp(calc(26px * 0.8), calc(26 * 100vw / 430), 26px); font-weight: 800; margin: 0; }
    .card { background: #fff; border-radius: 24px; padding: 24px; line-height: 1.7; color: #555; }
    .btn { margin-top: max(24px, env(safe-area-inset-top)); height: 54px; border-radius: 12px; background: #FF9F46; color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 800; }
  </style>
  <link rel="stylesheet" crossorigin href="home.css">
</head>
<body>
  <div id="app">
    <main class="page">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h1>문의하기</h1>
        <a href="setting.html" style="text-decoration:none; color:#000;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </a>
      </div>
      <section class="card">
        <h3 style="margin-top: 0; color: #FF9F46;">POOKSHIN 고객센터</h3>
        <p style="font-size: 15px; margin-bottom: 8px; color: #000; font-weight: bold;">와앙이에게 궁금한 점이 있으신가요?</p>
        <p style="font-size: 14px; color: #888; margin-bottom: 24px;">서비스 이용 불편, 오류 신고, 제휴 문의 등 다양한 의견을 환영합니다.</p>
        
        <div style="background: #F8F4EC; padding: 16px; border-radius: 12px; text-align: center; margin-bottom: 20px;">
          <div style="font-weight: bold; margin-bottom: 4px; color: #333;">이메일 문의</div>
          <div style="color: #FB7459; font-weight: 800; font-size: 18px;">support@pookshin.com</div>
        </div>
        <div style="font-size: 13px; color: #999; text-align: center;">평일 10:00 - 18:00 (주말 및 공휴일 휴무)</div>
      </section>
      <a href="setting.html" class="btn">돌아가기</a>
    </main>
  </div>
</body>
</html>
