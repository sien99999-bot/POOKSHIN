﻿<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#F8F4EC" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    .page { min-height: 100vh; background: #F8F4EC; padding-top: max(72px, env(safe-area-inset-top)); padding-bottom: 120px; padding-left: 24px; padding-right: 24px; box-sizing: border-box; }
    h1 { font-size: clamp(calc(26px * 0.8), calc(26 * 100vw / 430), 26px); font-weight: 800; margin: 0 0 20px; }

    .btn { margin-top: max(20px, env(safe-area-inset-top)); height: 54px; border-radius: 12px; background: #FF9F46; color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 800; }
  </style>
</head>
<body>
  <div id="app"><main class="page"><h1>문의하기</h1><section class="card"><textarea placeholder="문의 내용을 입력해주세요."></textarea><a href="setting.html" class="btn">보내기</a></section></main></div>
</body>
</html>
