    <style>
      body {
        background: #efefef;
      }
      #app {
        background-color: #ffffff;
        height: auto !important;
        min-height: 100dvh;
        overflow: visible !important; /* override home.css overflow:hidden — allow body scroll */
        padding-bottom: 130px; /* clear fixed menu bar */
      }
      @media (max-width: 480px) {
        body {
          align-items: flex-start !important;
          background-color: #ffffff !important;
          overflow-y: auto !important;
        }
        #app {
          width: 100% !important;
          max-width: 100%; max-width: 480px !important;
          box-shadow: none !important;
          background-color: #ffffff !important;
        }
      }

      .setting-header {
        margin-top: 27px; height: 24px; padding-left: 16px; padding-right: 16px; position: relative; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box;
      }
      .btn-back {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        text-decoration: none;
      }
      .header-title {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-size: 16px;
        font-weight: 700;
        color: #000;
        letter-spacing: -0.32px;
      }
      .header-bell {
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        width: 32px;
        height: 32px;
      }

      .user-summary-card {
        margin: 28px 16px 0;
        box-sizing: border-box;
        background: #f8f4ec;
        border-radius: 10px;
        padding: 10px 9px 23px 47px;
        display: flex;
        align-items: center;
        position: relative;
        height: 150px;
      }
      .user-thumb {
        width: 105px;
        height: 105px;
        border-radius: 50%;
        background: #ffa74a;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-right: 28px;
      }
      .user-thumb i {
        font-size: 48px;
        color: white;
      }

      .user-text {
        flex: 1;
      }
      .user-text h3 {
        font-size: 20px;
        font-weight: 600;
        color: #000;
        margin: 0 0 4px;
        letter-spacing: -0.4px;
      }
      .user-text p {
        font-size: 16px;
        font-weight: 500;
        color: #9b9b9b;
        margin: 0;
        letter-spacing: -0.32px;
      }

      .btn-edit {
        position: absolute;
        top: 12px;
        right: 9px;
        background: transparent;
        padding: 2px 8px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 4px;
        text-decoration: none;
      }
      .btn-edit span {
        font-size: 13px;
        font-weight: 500;
        color: #8b8b8b;
        letter-spacing: -0.26px;
      }
      .btn-edit i {
        font-size: 15.36px;
        color: #9b9b9b;
      }

      .setting-list {
        padding: 41px 0 130px;
      }
      .setting-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-left: 67px;
        padding-right: 81px; /* 430 - 349 = 81px */
        margin-bottom: 16px;
        text-decoration: none;
        color: #000;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: -0.32px;
      }
      .setting-item.subtitle {
        color: #9b9b9b;
        margin-bottom: 16px;
        pointer-events: none;
      }
      .divider {
        height: 1px;
        background: #eaeaea;
        width: 351px;
        margin: 18px auto 26px;
      }

      .toggle-switch {
        width: 43px;
        height: 24px;
        background: #fb7459;
        border-radius: 15px;
        position: relative;
        cursor: pointer;
      }
      .toggle-switch::after {
        content: "";
        position: absolute;
        top: 2px;
        right: 2px;
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
      }

      .footer-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 64px 0 67px;
        margin-top: 36px;
      }
      .footer-actions a {
        color: #9b9b9b;
        font-size: 16px;
        font-weight: 500;
        text-decoration: none;
        letter-spacing: -0.32px;
      }
    </style>
